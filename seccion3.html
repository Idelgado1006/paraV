    <link rel="stylesheet" href="style.css"> <style>
        /* Estilo específico para el Muro de Fotos Gracioso */
        
        .meme-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); /* Columnas pequeñas y automáticas */
            gap: 5px; /* Espacio mínimo para que parezca un collage */
            width: 100%;
            height: auto;
            padding: 20px 0;
            overflow: hidden;
        }

        .meme-item {
            width: 100%;
            height: 100px; /* Altura fija para que sean cuadradas */
            background-color: var(--glass);
            border: 1px solid var(--border-glass);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animación "bouncy" */
            border-radius: 8px;
        }

        .meme-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* La foto llena el cuadro sin deformarse */
            filter: grayscale(100%); /* Efecto inicial en blanco y negro para dar contraste */
            transition: var(--transition);
        }

        /* --- EFECTOS DE INTERACCIÓN (La parte graciosa) --- */

        .meme-item:hover {
            transform: scale(1.5) rotate(15deg); /* Se agranda y gira */
            z-index: 10; /* Se pone al frente */
            border-color: var(--accent); /* Cambia el borde al color de acento */
            box-shadow: 0 10px 30px -10px var(--accent-muted);
        }

        .meme-item:hover img {
            filter: grayscale(0%); /* La foto se pone a color al pasar el mouse */
        }

        /* Para el móvil: que no se agrande tanto */
        @media (max-width: 600px) {
            .meme-wall { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .meme-item { height: 80px; }
            .meme-item:hover { transform: scale(1.3) rotate(-10deg); }
        }
    </style>
</head>
