<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instantes | Saturación Responsiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; position: relative; min-height: 100vh; background-color: #000; margin: 0; }
        
        /* CAPA SUPERIOR: TEXTO SIEMPRE ARRIBA */
        header { 
            position: relative; 
            z-index: 10000; 
            pointer-events: none; 
            margin-top: 15vh; 
            text-align: center;
            padding: 0 20px;
        }

        h1 { 
            font-weight: 600; 
            letter-spacing: -1px; 
            font-size: 2.2rem; /* Un poco más grande para destacar */
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1), 0 0 5px rgba(0,0,0,0.5); 
        }

        .subtitle { 
            color: var(--text-dim); 
            font-size: 0.7rem; 
            letter-spacing: 3px; 
            text-transform: uppercase;
            opacity: 0.8;
        }

        .caos-container { position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; z-index: 1; }
        
        .foto-flotante {
            position: absolute; 
            object-fit: cover; 
            border-radius: 6px; 
            border: 1px solid var(--border-glass); 
            background-color: var(--glass);
            backdrop-filter: blur(4px); 
            transition: transform 0.3s ease-out, box-shadow 0.3s, border-color 0.3s;
            cursor: grab; 
            opacity: 0; 
            animation: aparecer 1.5s ease-out forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .foto-flotante:hover { 
            transform: scale(1.2) rotate(0deg) !important; 
            z-index: 9500 !important; 
            border-color: var(--accent);
            box-shadow: 0 0 50px var(--accent-muted);
        }

        @keyframes aparecer { to { opacity: 1; } }
        
        footer { position: fixed; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 10001; }
        .btn-universal { pointer-events: auto; background: rgba(250, 22, 90, 0.6); padding: 8px 16px; border-radius: 20px; text-decoration: none; }

        /* AJUSTES PARA CELULAR */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 0.6rem; }
            header { margin-top: 20vh; }
        }
    </style>
</head>
<body class="fade-in">
    <header>
        <h1>Me alegro!!!</h1>
        <p class="subtitle">Me alegro!!!</p>
    </header>

    <div id="caos-container" class="caos-container"></div>

    <footer>
        <a href="index.html" class="btn-universal" style="font-size: 0.75rem; letter-spacing: 2px;">← REGRESAR</a>
    </footer>

    <script>
        const misFotos = ['graciosa.jpeg'];
        const totalFotos = 60; 
        const container = document.getElementById('caos-container');
        let zIndexGlobal = 10;

        function crearCaos() {
            const isMobile = window.innerWidth <= 600;

            for (let i = 0; i < totalFotos; i++) {
                const img = document.createElement('img');
                img.src = misFotos[0];
                img.className = 'foto-flotante';

                // --- TAMAÑOS MÁS GRANDES Y RESPONSIVOS ---
                // Si es PC: 120px a 220px. Si es móvil: 70px a 130px.
                const minAncho = isMobile ? 70 : 120;
                const maxExtra = isMobile ? 60 : 100;
                
                const anchoAleatorio = minAncho + Math.random() * maxExtra; 
                const ratio = 384 / 725;
                const altoAleatorio = anchoAleatorio * ratio;

                img.style.width = `${anchoAleatorio}px`;
                img.style.height = `${altoAleatorio}px`;

                // Dispersión usando porcentajes para que funcione en cualquier pantalla
                const posX = (Math.random() * 110) - 10; // -10% a 100% para cubrir bordes
                const posY = (Math.random() * 110) - 10;
                const rot = (Math.random() - 0.5) * 40; 

                img.style.left = `${posX}%`;
                img.style.top = `${posY}%`;
                img.style.setProperty('--rot-inicial', `${rot}deg`);
                img.style.transform = `rotate(${rot}deg)`;
                
                img.addEventListener('mouseenter', () => {
                    img.style.zIndex = Math.min(zIndexGlobal++, 9999);
                });

                // Movimiento lento
                const duracion = 25 + Math.random() * 20; 
                img.style.animation += `, flotar ${duracion}s ease-in-out infinite alternate`;
                img.style.animationDelay = `${Math.random() * 5}s`;
                
                container.appendChild(img);
            }
        }

        window.onload = crearCaos;

        const style = document.createElement('style');
        style.innerHTML = `
        @keyframes flotar {
            0% { transform: translate(0, 0) rotate(var(--rot-inicial)); }
            100% { transform: translate(20px, 20px) rotate(calc(var(--rot-inicial) + 5deg)); }
        }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
