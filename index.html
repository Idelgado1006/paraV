<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Victoria</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh; width: 100vw;
            background: radial-gradient(circle at center, #0d1a2d 0%, #080f1a 100%);
            overflow-x: hidden; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- PANTALLA DE ACCESO SIMBÓLICO --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #080f1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1.5s ease, visibility 1.5s;
        }

        #login-screen.hidden { opacity: 0; visibility: hidden; }

        .login-box { text-align: center; width: 80%; max-width: 320px; transition: transform 0.3s; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        #login-msg { color: #fce4ec; font-weight: 300; font-style: italic; margin-bottom: 25px; font-size: 1.1rem; line-height: 1.4; }
        .error-msg { color: #d52d58 !important; }

        .login-box input {
            width: 100%; padding: 12px; border: none; border-bottom: 1px solid #d52d58;
            background: transparent; color: white; text-align: center; outline: none;
            font-size: 1rem; margin-bottom: 25px; font-style: italic;
        }

        .login-box button {
            background: transparent; color: #d52d58; border: 1px solid #d52d58;
            padding: 10px 30px; border-radius: 25px; cursor: pointer; transition: 0.3s;
            font-size: 0.9rem; letter-spacing: 1px;
        }
        .login-box button:hover { background: rgba(213, 45, 88, 0.1); }

        /* --- AMBIENTE DE LA FLOR --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px);
            background-size: 250px 250px; opacity: 0.12; z-index: 0; pointer-events: none;
        }

        .falling-petal {
            position: fixed; background: #d52d58; border-radius: 0 80% 0 80%;
            opacity: 0.25; z-index: 0; pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        .flower-wrapper { margin-top: 40px; height: 420px; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .container { position: relative; transform: scale(0.45); transform-origin: center; height: 850px; width: 600px; }
        
        .glass {
            height: 800px; width: 600px; background: rgba(18, 33, 57, 0.25);
            border-radius: 300px 300px 0px 0px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(1.5px); overflow: hidden;
        }
        .glass::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-25deg); animation: shine-glass 7s infinite;
        }
        @keyframes shine-glass { 0% { left: -150%; } 20% { left: 250%; } 100% { left: 250%; } }

        /* Pétalos y Animación */
        .petals>div { position: absolute; background: #d52d58; width: 85px; height: 120px; top: 200px; transition: all 0.6s ease-out; }
        .petals>div:nth-child(1) { border-radius: 15px; box-shadow: 0px 0px 50px rgba(213, 45, 88, 0.6); left: 268px; }
        .petals>div:nth-child(2), .petals>div:nth-child(4), .petals>div:nth-child(6) { background: #b81b43; left: 230px; border-radius: 0px 50px 0px 50px; transform-origin: bottom right; }
        .petals>div:nth-child(3), .petals>div:nth-child(5), .petals>div:nth-child(7) { background: #b81b43; left: 300px; border-radius: 50px 0px 50px 0px; transform-origin: bottom left; }
        
        .animated .petals>div:nth-child(2) { z-index: 5; animation: bloom2 3s ease-in-out forwards; }
        .animated .petals>div:nth-child(3) { z-index: 4; animation: bloom3 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(4) { z-index: 3; animation: bloom4 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(5) { z-index: 2; animation: bloom5 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(6) { z-index: 1; animation: bloom6 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(7) { z-index: 0; animation: bloom7 3s ease-in-out forwards, glowing 2.5s infinite; }

        @keyframes bloom2 { 50% { transform: rotate(-90deg); top: 400px; left: 150px; } 100% { transform: rotate(-60deg); top: 615px; left: 100px; background: #71122a; } }
        @keyframes bloom3 { 100% { transform: rotate(50deg); } }
        @keyframes bloom4 { 100% { transform: rotate(-25deg); } }
        @keyframes bloom5 { 100% { transform: rotate(25deg); } }
        @keyframes bloom6 { 100% { transform: rotate(-10deg); } }
        @keyframes bloom7 { 100% { transform: rotate(10deg); } }
        @keyframes glowing { 50% { background: #d7365f; box-shadow: 0px 0px 40px rgba(213, 45, 88, 0.7); } }

        .leaves>div:nth-child(1) { position: absolute; width: 15px; height: 390px; background: #054c05; top: 308px; left: 300px; border-radius: 0 0 100px 100px; }
        .leaves>div:nth-child(2) { position: absolute; width: 60px; height: 100px; border-radius: 10px 80px 40px 80px; background: #054c05; transform-origin: bottom; transform: rotate(-30deg); top: 412px; left: 254px; box-shadow: inset 10px 10px #066406; }
        .leaves>div:nth-child(3) { position: absolute; width: 60px; height: 100px; border-radius: 80px 1px 80px 40px; background: #054c05; transform-origin: bottom; transform: rotate(30deg); top: 360px; left: 300px; box-shadow: inset -10px 10px #066406; }

        /* TEXTO DINÁMICO */
        .texto-container { width: 85%; padding: 20px 0 30px 0; text-align: center; z-index: 2; }
        .texto { color: #fce4ec; font-size: 19px; line-height: 1.8; font-weight: 300; font-style: italic; text-shadow: 0 0 8px rgba(213, 45, 88, 0.3); margin: 0; }
        
        #btn-promesa {
            display: none; padding: 12px 28px; background: transparent; color: #fce4ec; border: 1px solid #d52d58;
            border-radius: 25px; font-style: italic; cursor: pointer; z-index: 10; margin-bottom: 60px; animation: fadeIn 2s forwards;
            transition: 0.3s;
        }
        #btn-promesa:hover { background: rgba(213, 45, 88, 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #cursor { width: 2px; height: 18px; background: #d52d58; display: inline-block; animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        .heart-pop { position: fixed; font-size: 22px; color: #d52d58; z-index: 100; pointer-events: none; animation: popUp 2.5s ease-out forwards; }
        @keyframes popUp { to { transform: translateY(-180px) translateX(var(--x)) scale(0); opacity: 0; } }
    </style>
</head>

<body>
    <div id="login-screen">
        <div class="login-box" id="login-container">
            <h2 id="login-msg">Para que algo florezca, necesita...</h2>
            <input type="password" id="password" placeholder="Escribe aquí...">
            <br>
            <button onclick="checkPassword()">Entrar</button>
        </div>
    </div>

    <div class="flower-wrapper" id="main-content">
        <div class="container">
            <div class="glass">
                <div style="width: 30px; height: 350px; background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); position: absolute; left: 85%; top: 150px; border-radius: 100px; z-index: 10;"></div>
            </div>
            <div class="thorns">
                <div style="position: absolute; width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 15px solid #054c05; left: 315px; top: 465px;"></div>
                <div style="position: absolute; width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 15px solid #054c05; left: 285px; top: 390px;"></div>
            </div>
            <div class="leaves"><div></div><div></div><div></div></div>
            <div class="petals"><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
        </div>
    </div>
    
    <div class="texto-container">
        <h4 class="texto" id="mensaje"></h4><span id="cursor" style="display:none"></span>
    </div>

    <button id="btn-promesa" onclick="hacerPromesa()">Incondicional</button>

    <script>
        function checkPassword() {
            const pass = document.getElementById("password").value.toLowerCase().trim();
            const msg = document.getElementById("login-msg");
            const container = document.getElementById("login-container");

            // Permite varias opciones lógicas para no frustrar el momento
            if (pass === "tiempo" || pass === "paciencia" || pass === "paz") { 
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("main-content").classList.add("animated");
                setTimeout(iniciarExperiencia, 1200);
            } else {
                msg.innerHTML = "Inténtalo otra vez...";
                msg.classList.add("error-msg");
                container.classList.add("shake");
                document.getElementById("password").value = "";
                setTimeout(() => { container.classList.remove("shake"); }, 400);
            }
        }

        function iniciarExperiencia() {
            document.getElementById("cursor").style.display = "inline-block";
            escribir();
            setInterval(createFallingPetals, 700);
        }

        function createFallingPetals() {
            const petal = document.createElement('div');
            petal.classList.add('falling-petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 12 + 8 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 6 + 4 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 10000);
        }

        const textoOriginal = "Lo que es real no le teme al tiempo ni a los procesos. Entiendo que necesites encontrar esa versión de ti que tanto deseas ser; yo sigo creyendo en lo que somos, y aquí estaré para reencontrarte cuando tu corazón esté en paz, te amo.";
        const elementoTexto = document.getElementById("mensaje");
        const cursor = document.getElementById("cursor");
        let i = 0;

        function escribir() {
            if (i < textoOriginal.length) {
                elementoTexto.innerHTML += textoOriginal.charAt(i);
                i++;
                setTimeout(escribir, 50);
            } else {
                cursor.style.display = "none";
                // Pausa antes de mostrar el botón de cierre
                setTimeout(() => {
                    document.getElementById("btn-promesa").style.display = "inline-block";
                }, 1000);
            }
        }

        function hacerPromesa() {
            document.getElementById("btn-promesa").style.display = "none";
            elementoTexto.style.transition = "opacity 0.5s";
            elementoTexto.style.opacity = 0;
            
            setTimeout(() => {
                elementoTexto.innerHTML = "Lo que florece con paciencia, dura para siempre.";
                elementoTexto.style.opacity = 1;
                // Explosión de corazones sutil
                for(let j=0; j<25; j++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.innerHTML = "❤";
                        heart.classList.add('heart-pop');
                        heart.style.left = (45 + Math.random() * 10) + "vw";
                        heart.style.top = "65vh";
                        heart.style.setProperty('--x', (Math.random() * 350 - 175) + 'px');
                        document.body.appendChild(heart);
                        setTimeout(() => heart.remove(), 2500);
                    }, j * 50);
                }
            }, 500);
        }
    </script>
</body>

</html>
