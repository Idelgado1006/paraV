<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivo | Refugio Visual</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #0a0f16;
            --accent: #fa165a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- LOGIN SCREEN (SaaS Style) --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: var(--transition);
        }
        #login-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-card h2 { font-weight: 300; font-size: 1.1rem; margin-bottom: 25px; color: var(--text-dim); line-height: 1.5; }
        .login-card input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);
            padding: 15px; border-radius: 12px; color: white; text-align: center;
            outline: none; margin-bottom: 20px; transition: var(--transition);
        }
        .login-card input:focus { border-color: var(--accent); }
        .login-card button {
            background: var(--accent); color: white; border: none; padding: 14px 30px;
            border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: var(--transition);
        }

        /* --- CONTENEDOR DE LA FLOR --- */
        .flower-wrapper { 
            margin-top: 20px; width: 100%; height: 450px; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 1; opacity: 0; transition: opacity 2s ease;
        }
        .visible .flower-wrapper { opacity: 1; }

        .container { 
            position: relative; 
            transform: scale(calc(min(0.5, 0.5 * (100vw / 400px)))); 
            transform-origin: center; height: 850px; width: 600px; 
        }

        .glass {
            height: 800px; width: 600px; background: rgba(255, 255, 255, 0.02);
            border-radius: 300px 300px 0px 0px; position: relative;
            border: 1px solid var(--border-glass); backdrop-filter: blur(2px); overflow: hidden;
        }
        .glass::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg); animation: shine-glass 8s infinite;
        }
        @keyframes shine-glass { 0% { left: -150%; } 20% { left: 250%; } 100% { left: 250%; } }

        /* PÉTALOS Y ANIMACIONES */
        .petals>div { position: absolute; background: var(--accent); width: 85px; height: 120px; top: 200px; transition: all 0.6s ease-out; }
        .petals>div:nth-child(1) { border-radius: 15px; box-shadow: 0px 0px 50px rgba(250, 22, 90, 0.4); left: 268px; }
        .petals>div:nth-child(2), .petals>div:nth-child(4), .petals>div:nth-child(6) { background: #d4124d; left: 230px; border-radius: 0px 50px 0px 50px; transform-origin: bottom right; }
        .petals>div:nth-child(3), .petals>div:nth-child(5), .petals>div:nth-child(7) { background: #d4124d; left: 300px; border-radius: 50px 0px 50px 0px; transform-origin: bottom left; }
        
        .animated .petals>div:nth-child(2) { z-index: 5; animation: bloom2 3s ease-in-out forwards; }
        .animated .petals>div:nth-child(3) { z-index: 4; animation: bloom3 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(4) { z-index: 3; animation: bloom4 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(5) { z-index: 2; animation: bloom5 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(6) { z-index: 1; animation: bloom6 3s ease-in-out forwards, glowing 2.5s infinite; }
        .animated .petals>div:nth-child(7) { z-index: 0; animation: bloom7 3s ease-in-out forwards, glowing 2.5s infinite; }

        @keyframes bloom2 { 50% { transform: rotate(-90deg); top: 400px; left: 150px; } 100% { transform: rotate(-60deg); top: 615px; left: 100px; background: #71122a; } }
        @keyframes bloom3 { 100% { transform: rotate(50deg); } }
        @keyframes bloom4 { 100% { transform: rotate(-25deg); } }
        @keyframes bloom5 { 100% { transform: rotate(25deg); } }
        @keyframes bloom6 { 100% { transform: rotate(-10deg); } }
        @keyframes bloom7 { 100% { transform: rotate(10deg); } }
        @keyframes glowing { 50% { background: #ff2a6d; box-shadow: 0px 0px 40px rgba(250, 22, 90, 0.5); } }

        .leaves>div:nth-child(1) { position: absolute; width: 15px; height: 390px; background: #075e07; top: 308px; left: 300px; border-radius: 0 0 100px 100px; }
        .leaves>div:nth-child(2) { position: absolute; width: 60px; height: 100px; border-radius: 10px 80px 40px 80px; background: #075e07; transform-origin: bottom; transform: rotate(-30deg); top: 412px; left: 254px; box-shadow: inset 10px 10px #0a7a0a; }
        .leaves>div:nth-child(3) { position: absolute; width: 60px; height: 100px; border-radius: 80px 1px 80px 40px; background: #075e07; transform-origin: bottom; transform: rotate(30deg); top: 360px; left: 300px; box-shadow: inset -10px 10px #0a7a0a; }

        /* TEXTO Y BOTONES */
        .texto-container { width: 85%; max-width: 500px; padding: 20px 0; text-align: center; z-index: 2; min-height: 150px; }
        .texto { color: var(--text-main); font-size: 1rem; line-height: 1.8; font-weight: 300; font-style: italic; }
        
        #btn-promesa {
            display: none; padding: 15px 35px; background: transparent; color: var(--accent); border: 1px solid var(--accent);
            border-radius: 14px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
            transition: var(--transition); margin-top: 20px;
        }
        #btn-promesa:hover { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(250, 22, 90, 0.3); }

        /* ELEMENTOS DINÁMICOS */
        .falling-petal {
            position: fixed; background: var(--accent); border-radius: 0 80% 0 80%;
            opacity: 0.15; z-index: 0; pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        .heart-pop { position: fixed; font-size: 24px; color: var(--accent); z-index: 100; pointer-events: none; animation: popUp 2.5s ease-out forwards; }
        @keyframes popUp { to { transform: translateY(-200px) translateX(var(--x)) scale(0); opacity: 0; } }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>

<body>
    <div id="login-screen">
        <div class="login-card" id="login-container">
            <h2 id="login-msg">Para que algo florezca,<br>necesita...</h2>
            <input type="password" id="password" placeholder="Palabra clave">
            <button onclick="checkPassword()">Acceder al Refugio</button>
        </div>
    </div>

    <div class="flower-wrapper" id="main-content">
        <div class="container">
            <div class="glass">
                <div style="width: 25px; height: 350px; background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent); position: absolute; left: 85%; top: 150px; border-radius: 100px; z-index: 10;"></div>
            </div>
            <div class="thorns">
                <div style="position: absolute; width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 15px solid #075e07; left: 315px; top: 465px;"></div>
                <div style="position: absolute; width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 15px solid #075e07; left: 285px; top: 390px;"></div>
            </div>
            <div class="leaves"><div></div><div></div><div></div></div>
            <div class="petals"><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
        </div>
    </div>
    
    <div class="texto-container">
        <p class="texto" id="mensaje"></p>
        <button id="btn-promesa" onclick="hacerPromesa()">Incondicional</button>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById("password").value.toLowerCase().trim();
            const validPasswords = ["tiempo", "paciencia", "paz"];
            
            if (validPasswords.includes(pass)) { 
                document.getElementById("login-screen").classList.add("hidden");
                document.body.classList.add("visible");
                setTimeout(() => {
                    document.getElementById("main-content").classList.add("animated");
                    iniciarExperiencia();
                }, 1000);
            } else {
                const container = document.getElementById("login-container");
                container.classList.add("shake");
                setTimeout(() => { container.classList.remove("shake"); }, 400);
            }
        }

        function iniciarExperiencia() { 
            escribir(); 
            setInterval(createFallingPetals, 900); 
        }

        function createFallingPetals() {
            const petal = document.createElement('div');
            petal.classList.add('falling-petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 10 + 6 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 5 + 5 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 10000);
        }

        const textoOriginal = "Lo que es real no le teme al tiempo ni a los procesos. Entiendo que necesites encontrar esa versión de ti que tanto deseas ser; yo sigo creyendo en lo que somos, y aquí estaré para reencontrarte cuando tu corazón esté en paz, te amo.";
        let i = 0;

        function escribir() {
            if (i < textoOriginal.length) {
                document.getElementById("mensaje").innerHTML += textoOriginal.charAt(i);
                i++;
                setTimeout(escribir, 45);
            } else {
                setTimeout(() => { 
                    const btn = document.getElementById("btn-promesa");
                    btn.style.display = "inline-block";
                    btn.style.animation = "fadeIn 1.5s forwards";
                }, 800);
            }
        }

        function hacerPromesa() {
            document.getElementById("btn-promesa").style.display = "none";
            const msg = document.getElementById("mensaje");
            msg.style.transition = "opacity 0.8s";
            msg.style.opacity = 0;
            
            setTimeout(() => {
                msg.innerHTML = "Lo que florece con paciencia, dura para siempre.";
                msg.style.opacity = 1;
                // Explosión de corazones
                for(let j=0; j<25; j++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.innerHTML = "❤";
                        heart.classList.add('heart-pop');
                        heart.style.left = (48 + (Math.random() * 4 - 2)) + "vw";
                        heart.style.top = "60vh";
                        heart.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
                        document.body.appendChild(heart);
                        setTimeout(() => heart.remove(), 2500);
                    }, j * 70);
                }
            }, 800);
        }

        // Enter para entrar
        document.getElementById("password").addEventListener("keypress", (e) => {
            if(e.key === "Enter") checkPassword();
        });
    </script>
</body>
</html>
