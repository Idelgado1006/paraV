<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivo | Sintonía Diaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f16;
            --accent: #fa165a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.15);
            --spring-eas: cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --accent-rgb: 250, 22, 90;
            --btn-bg: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* TEMAS NAVBAR */
        body.theme-midnight {
            --bg-dark: #000000;
            --accent: #fde047;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border-glass: rgba(253, 224, 71, 0.3);
            --accent-rgb: 253, 224, 71;
            --btn-bg: rgba(253, 224, 71, 0.1);
        }

        body.theme-light {
            --bg-dark: #fcfaf7;
            --accent: #f59e0b;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border-glass: rgba(245, 158, 11, 0.3);
            --accent-rgb: 245, 158, 11;
            --btn-bg: rgba(245, 158, 11, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(rgba(var(--accent-rgb), 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 0.6s ease;
        }

        /* --- ESTILOS NAVBAR --- */
        .navbar {
            position: fixed; top: 15px; width: calc(100% - 30px); max-width: 500px; height: 65px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass); border-radius: 22px; z-index: 10000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 12px;
            box-shadow: var(--shadow); animation: slideDown 0.8s var(--spring-eas);
        }

        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-home, .nav-extra-btn, .nav-heart-btn, .theme-btn {
            text-decoration: none; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: var(--btn-bg); border: 1px solid var(--border-glass);
            transition: all 0.2s var(--spring-eas); cursor: pointer; color: var(--text-main); font-size: 1.1rem;
        }

        .nav-home:active, .nav-extra-btn:active, .nav-heart-btn:active, .theme-btn:active {
            transform: scale(0.9) translateY(2px); background: rgba(var(--accent-rgb), 0.2);
        }

        .system-status { display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .status-dot-wrapper { display: flex; align-items: center; gap: 6px; font-family: monospace; font-size: 0.55rem; font-weight: 700; color: var(--text-main); }
        .dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .heart-icon { animation: heartBeat 1.5s infinite; display: inline-block; }
        .nav-divider { width: 1px; height: 24px; background: var(--border-glass); margin: 0 2px; }

        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes heartBeat { 0%, 70%, 100% { transform: scale(1); } 14% { transform: scale(1.2); } 42% { transform: scale(1.2); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- CONTENIDO PRINCIPAL --- */
        .header-title {
            margin-top: 100px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
        }

        .music-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .day-message { 
            font-weight: 300; 
            font-size: 0.95rem; 
            margin-bottom: 25px; 
            line-height: 1.6; 
            color: var(--text-dim);
        }

        .day-highlight { color: var(--accent); font-weight: 600; }

        .album-art-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-glass);
        }

        .album-art-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0; transition: opacity 1s ease; 
        }

        #player-container { 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
        }

        .btn-spotify {
            display: flex; align-items: center; justify-content: center;
            background: #1DB954; color: white; text-decoration: none;
            padding: 16px; border-radius: 14px; font-size: 0.85rem; 
            font-weight: 700; transition: var(--transition); letter-spacing: 1px;
        }

        .btn-spotify:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .system-tip {
            margin: 30px 0;
            padding: 15px 20px;
            border: 1px dashed var(--border-glass); 
            border-radius: 16px;
            max-width: 350px;
            text-align: center;
            background: rgba(var(--accent-rgb), 0.05);
        }

        .history-section { width: 100%; max-width: 400px; padding-bottom: 60px; z-index: 10; }

        #btn-history {
            background: var(--btn-bg);
            border: 1px solid var(--border-glass);
            color: var(--text-dim);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            text-transform: uppercase;
        }
        #btn-history:hover { border-color: var(--accent); color: var(--text-main); background: rgba(var(--accent-rgb), 0.1); }

        #history-list { margin-top: 25px; display: none; }

        .history-item {
            background: var(--glass);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .h-date { font-size: 0.65rem; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .h-song { font-weight: 600; font-size: 0.9rem; color: var(--text-main); margin-bottom: 4px; display: block; }
        .h-msg { font-size: 0.8rem; color: var(--text-dim); font-style: italic; line-height: 1.4; }

        .falling-petal {
            position: fixed; background: var(--accent); border-radius: 0 80% 0 80%;
            opacity: 0.15; z-index: 1; pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall { 
            0% { transform: translateY(-10vh) rotate(0deg); } 
            100% { transform: translateY(110vh) rotate(360deg); } 
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body class="theme-dark fade-in">

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-home">🏠</a>
            <div class="system-status">
                <div class="status-dot-wrapper">
                    <span class="dot"></span> SISTEMA_ACTIVO
                </div>
                <div style="font-size: 0.5rem; color: var(--text-dim); font-family: monospace; margin-left: 13px;">v2.4.0 / ARCHIVO</div>
            </div>
        </div>

        <div class="nav-right">
            <a href="https://idelgado1006.github.io/CALKI/" class="nav-extra-btn" title="Extra">🔗</a>
            <a href="seccion5.html" class="nav-heart-btn" title="Refugio"><span class="heart-icon">❤️</span></a>
            <div class="nav-divider"></div>
            <button class="theme-btn" onclick="cycleTheme()" id="themeBtn">💖</button>
        </div>
    </nav>

    <h1 class="header-title">Canción Diaria</h1>
    
    <div class="music-card">
        <p class="day-message" id="msg-dia">Sincronizando con el servidor...</p>
        <div class="album-art-container">
            <img id="album-cover" src="" alt="Portada">
        </div>
        <div id="player-container"></div>
        <a id="spotify-link" href="#" target="_blank" class="btn-spotify">REPRODUCIR EN SPOTIFY</a>
    </div>

    <div class="system-tip">
        <p style="margin: 0; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.5px; line-height: 1.5;">
            <span style="color: var(--accent); font-weight: bold;">AVISO DEL SISTEMA:</span><br>
            Las iniciales en el registro de canciones forman la llave de acceso.
        </p>
    </div>

    <div class="history-section">
        <button id="btn-history" onclick="toggleHistory()">Ver registros anteriores</button>
        <div id="history-list"></div>
    </div>

    <script>
        // LÓGICA DE TEMAS
        let currentTheme = 0; 
        const themes = ['theme-dark', 'theme-midnight', 'theme-light'];
        const icons = ['💖', '🌙', '☀️'];

        function cycleTheme() {
            document.body.classList.remove(themes[currentTheme]);
            currentTheme = (currentTheme + 1) % themes.length;
            document.body.classList.add(themes[currentTheme]);
            document.getElementById('themeBtn').innerText = icons[currentTheme];
            if(navigator.vibrate) navigator.vibrate(10);
        }

        // LÓGICA DE GOOGLE SHEETS
        const SHEET_ID = '1OkOYolMxeWx5AmxA9RydHrRjesdK5qnUPsQtS003k_w';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja%201`;

        async function initSintonia() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;

                const hoy = new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'America/Panama',
                    year: 'numeric', month: '2-digit', day: '2-digit'
                }).format(new Date());

                const diaEncontrado = rows.find(r => {
                    if (!r.c[0] || !r.c[0].v) return false;
                    return r.c[0].v.toString().replace(/\//g, '-') === hoy;
                });

                if (diaEncontrado) {
                    renderMainCard(diaEncontrado);
                } else {
                    document.getElementById('msg-dia').innerText = "Vuelve mañana para una nueva frecuencia.";
                }

                renderHistory(rows, hoy);

            } catch (error) {
                document.getElementById('msg-dia').innerText = "Error de sincronización.";
            }
        }

        function renderMainCard(fila) {
            let rawId = fila.c[3] ? fila.c[3].v.toString().trim() : "";
            if (rawId.includes('track/')) rawId = rawId.split('track/')[1].split('?')[0];

            const diaNombre = fila.c[1] ? fila.c[1].v : "";
            const mensaje = fila.c[2] ? fila.c[2].v : "";
            const coverUrl = fila.c[4] ? fila.c[4].v : "";

            const msgBox = document.getElementById('msg-dia');
            const regex = new RegExp(diaNombre, "gi");
            msgBox.innerHTML = mensaje.replace(regex, `<span class="day-highlight">${diaNombre}</span>`);

            if (coverUrl) {
                const img = document.getElementById('album-cover');
                img.src = coverUrl;
                img.onload = () => img.style.opacity = "1";
            }

            if (rawId) {
                document.getElementById('spotify-link').href = `https://open.spotify.com/track/${rawId}`;
                document.getElementById('player-container').innerHTML = `
                    <iframe src="https://open.spotify.com/embed/track/${rawId}?utm_source=generator&theme=0" 
                        width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        style="border-radius:12px; border:none;"></iframe>`;
            }
        }

        function renderHistory(rows, hoy) {
            const histList = document.getElementById('history-list');
            
            // Filtramos las canciones que ya han pasado o son de hoy
            // Al quitar el .reverse(), mantenemos el orden cronológico del Sheets
            const pasadosYHoy = rows.filter(r => {
                if (!r.c[0] || !r.c[0].v) return false;
                const fExcel = r.c[0].v.toString().replace(/\//g, '-');
                return fExcel <= hoy;
            });

            histList.innerHTML = pasadosYHoy.map(r => {
                const fecha = r.c[0] ? r.c[0].v : "";
                const msgOriginal = r.c[2] ? r.c[2].v : "";
                const nombreCancion = r.c[5] ? r.c[5].v : "Unknown Track";
                const artista = r.c[6] ? r.c[6].v : "Unknown Artist";

                return `
                    <div class="history-item">
                        <span class="h-date">${fecha}</span>
                        <span class="h-song">${nombreCancion} — ${artista}</span>
                        <p class="h-msg">${msgOriginal}</p>
                    </div>
                `;
            }).join('');
        }

        function toggleHistory() {
            const list = document.getElementById('history-list');
            const btn = document.getElementById('btn-history');
            if (list.style.display === 'block') {
                list.style.display = 'none';
                btn.innerText = 'Ver registros anteriores';
            } else {
                list.style.display = 'block';
                btn.innerText = 'Cerrar registros';
            }
        }

        function petals() {
            const p = document.createElement('div');
            p.className = 'falling-petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 5 + 3) + 'px';
            p.style.animationDuration = (Math.random() * 5 + 7) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }

        window.onload = () => {
            initSintonia();
            setInterval(petals, 1200);
        };

                // Pega aquí la NUEVA URL que copiaste en el paso anterior
          const MI_NUEVA_URL = 'https://script.google.com/macros/s/AKfycbz3S9LOoHvnYnhPtHHPIiFj_oITiTsIwCm1WSXKK8kDsY_lWko7qrZjVFLtRClJLqc0/exec';
  
          const infoCelu = encodeURIComponent(navigator.userAgent);
          const seccion = "ABRIÓ: SECCIÓN 4"; 

      // Esto envía el modelo del celular al Excel apenas ella abre la página
          fetch(`${MI_NUEVA_URL}?tipo=${seccion}&ua=${infoCelu}`, { mode: 'no-cors' });
    </script>
</body>
</html>
