<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sintonía | El Detalle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:italic@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg: #000;
            --pearl-main: #fffdf5; /* Blanco perla crema */
            --pearl-lustre: rgba(255, 255, 255, 0.85);
            --accent-muted: rgba(250, 22, 90, 0.1); /* Tu color acento sutil para el aura */
        }

        body { 
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            padding: 20px;
            touch-action: none; /* Evita scroll accidental */
        }

        /* --- CONTENEDOR DEL COLLAR (RESPONSIVO) --- */
        .necklace-container {
            position: relative;
            width: 80vw; /* Ancho relativo a la pantalla */
            max-width: 320px; /* Ancho máximo en PC */
            height: 60vh; /* Alto relativo */
            max-height: 380px; /* Alto máximo */
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        /* --- LA PERLA INDIVIDUAL (CSS ART) --- */
        .pearl {
            position: absolute;
            border-radius: 50%;
            background-color: var(--pearl-main);
            
            /* Gradiente de Nácar: Brillo especular y sombra de volumen */
            background-image: 
                radial-gradient(circle at 35% 35%, #fff 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.15) 0%, transparent 60%);
            
            /* Sombras complejas para efecto esférico real */
            box-shadow: 
                inset -2px -2px 6px rgba(0,0,0,0.1), /* Profundidad interna */
                0 3px 8px rgba(0,0,0,0.3); /* Sombra proyectada sutil */
            
            /* Animación de brillo orgánico */
            animation: pearlGlow 4s infinite ease-in-out;
            will-change: transform, box-shadow;
        }

        /* --- LUZ DE FONDO (AURA) --- */
        .aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 300px;
            background: radial-gradient(ellipse at center, var(--accent-muted) 0%, transparent 70%);
            z-index: 0;
            border-radius: 50%;
        }

        /* --- TEXTO ROMÁNTICO --- */
        .caption {
            text-align: center;
            z-index: 10;
            max-width: 300px;
            padding: 0 10px;
        }

        .caption h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 1.5rem;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #efefef;
            opacity: 0;
            animation: fadeInTexto 2s forwards 1.5s;
        }

        .caption p {
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #555;
            margin-top: 10px;
            opacity: 0;
            animation: fadeInTexto 2s forwards 2.8s;
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes pearlGlow {
            0%, 100% { box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset -2px -2px 6px rgba(0,0,0,0.1); }
            50% { box-shadow: 0 3px 20px var(--pearl-lustre), inset -3px -3px 10px rgba(255,255,255,0.4); transform: scale(1.03); }
        }

        @keyframes fadeInTexto { to { opacity: 1; } }

        /* --- BOTÓN DE REGRESAR --- */
        footer {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 10001;
        }

        .btn-universal { 
            pointer-events: auto; 
            font-size: 0.75rem; 
            letter-spacing: 2px;
            opacity: 0.6;
            transition: 0.3s;
        }
        .btn-universal:hover { opacity: 1; color: #fa165a; }

        /* AJUSTES PARA CELULAR */
        @media (max-width: 600px) {
            .caption h2 { font-size: 1.3rem; }
            .necklace-container { max-height: 320px; }
        }
    </style>
</head>
<body class="fade-in">

    <div class="aura"></div>

    <div class="necklace-container" id="necklace">
        </div>

    <div class="caption">
        <h2>Un detalle para alguien inolvidable.</h2>
        <div style="width: 40px; height: 1px; background: rgba(250, 22, 90, 0.4); margin: 20px auto;"></div>
        <p>Próximamente • PH</p>
    </div>

    <footer>
        <a href="index.html" class="btn-universal">← REGRESAR AL INICIO</a>
    </footer>

    <script>
        const container = document.getElementById('necklace');
        const totalPearls = 24; // Cantidad de perlas para una caída rica
        
        // Obtener dimensiones reales del contenedor para el cálculo responsivo
        const containerWidth = container.offsetWidth;
        const containerHeight = container.offsetHeight;

        for (let i = 0; i < totalPearls; i++) {
            const pearl = document.createElement('div');
            pearl.className = 'pearl';
            
            // Lógica de caída en "U" profunda (Parábola Responsiva)
            // t va de -1 a 1 para simular la simetría de la curva
            const t = (i / (totalPearls - 1)) * 2 - 1;
            
            // Curva: x es lineal, y es cuadrática (t^2)
            // Usamos un margen interno de seguridad (20px)
            const x = (t * (containerWidth / 2 - 20)) + (containerWidth / 2);
            const y = (t * t) * (containerHeight * 0.75) + 50; // La caída usa el 75% del alto disponible
            
            // Tamaño Responsivo y Perspectiva: 
            // Las perlas centrales son un poco más grandes (perspectiva de cercanía)
            const baseSize = window.innerWidth <= 600 ? 10 : 13; // Más pequeñas en móvil
            const size = baseSize + (1 - Math.abs(t)) * 5; // Factor de perspectiva (+5px en el centro)
            
            pearl.style.width = `${size}px`;
            pearl.style.height = `${size}px`;
            
            // Posicionamiento absoluto ajustado por el tamaño de la perla
            pearl.style.left = `${x - size/2}px`;
            pearl.style.top = `${y - size/2}px`;
            
            // Retraso de animación aleatorio masivo para el brillo orgánico
            // Esto hace que parezca que "vibran" de forma independiente
            pearl.style.animationDelay = `-${Math.random() * 5}s`;
            
            container.appendChild(pearl);
        }
    </script>
</body>
</html>
