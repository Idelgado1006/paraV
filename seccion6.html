<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Tiempo | Conexión Activa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #0a0f16;
            --accent: #fa165a;
            --accent-muted: rgba(250, 22, 90, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(250, 22, 90, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative; /* Importante para las luciérnagas */
        }

        .counter-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 50px 25px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
            position: relative;
            z-index: 10; /* Por encima de las luciérnagas iniciales */
        }

        .counter-container.pulse-active {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(250, 22, 90, 0.2);
        }

        .counter-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        .timer-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .time-unit span {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-main);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            transition: all 0.3s ease;
        }

        .pulse-active .time-unit span {
            color: var(--accent);
            text-shadow: var(--glow);
        }

        .time-separator {
            font-size: 2rem;
            color: var(--accent);
            opacity: 0.4;
            margin-top: -25px;
        }

        .time-unit small {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 12px;
            letter-spacing: 1.5px;
        }

        .presence-btn {
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-dim);
            padding: 15px 30px;
            border-radius: 100px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .presence-btn:hover {
            color: var(--text-main);
            border-color: var(--accent);
            background: var(--accent-muted);
        }

        .presence-btn.sent {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.05);
            animation: success-bounce 0.4s ease;
        }

        @keyframes success-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* --- SECCIÓN DE RECOMPENSA (Sutil e integrada) --- */
        .milestone-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            opacity: 0;
            transition: opacity 1s ease;
        }

        .milestone-box.show { opacity: 1; }

        #ms-icon { font-size: 1.5rem; display: block; margin-bottom: 10px; }
        #ms-text { font-size: 0.8rem; color: var(--text-dim); font-style: italic; line-height: 1.5; }

        .footer-tag {
            display: block;
            margin-top: 30px;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--accent);
            opacity: 0.6;
        }

        /* --- ESTILOS DE LAS LUCIÉRNAGAS (EFECTO MÁGICO) --- */
        .firefly {
            position: absolute;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px rgba(250, 22, 90, 0.5);
            opacity: 0;
            z-index: 1; /* Por detrás del contenedor */
        }

        @media (max-width: 480px) {
            .time-unit span { font-size: 2.2rem; }
            .time-separator { font-size: 1.5rem; margin-top: -18px; }
            .counter-container { padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <div class="counter-container" id="main-frame">
        <p class="counter-label">BURN THE SHIPS</p>
        
        <div class="timer-grid">
            <div class="time-unit"><span id="days">00</span><small>días</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="hours">00</span><small>hrs</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="minutes">00</span><small>min</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="seconds">00</span><small>seg</small></div>
        </div>

        <button class="presence-btn" id="btn-presence" onclick="reportarPresencia()">
            PULSAR
        </button>

        <div id="milestone-display" class="milestone-box">
            <span id="ms-icon"></span>
            <p id="ms-text"></p>
        </div>

        <span class="footer-tag">LOG_STATUS: DISTANCIA // 31-MAR-10:21</span>
    </div>

    <script>
        // CONFIGURACIÓN (Tus datos originales)
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbylhcRb3qWKynJyU-ggE4asJ2_6bRSUEBxO2eo6yHlQbz2sJ4P8sePOrYEPrb9Zzsv_/exec'; 
        const SHEET_ID = '1OkOYolMxeWx5AmxA9RydHrRjesdK5qnUPsQtS003k_w';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja%201`;
        
        let startPoint = null;
        let count = parseInt(localStorage.getItem('v_presences')) || 0;

        // MOTOR DE HITOS (Edita los textos si quieres!)
        const hitos = {
            1:  { icon: '', text: "Presiona este botón siempre que estes aquí, lo entenderás más adelante" },

        };

        async function init() {
            actualizarHito(count); // Cargar hito guardado
            try {
                const response = await fetch(DATA_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const val = json.table.rows[0].c[11] ? json.table.rows[0].c[11].v : null;

                if (val) {
                    const n = val.toString().match(/\d+/g).map(Number);
                    if (val.toString().includes('Date')) {
                        // Mes nativo Google (0-11)
                        startPoint = new Date(n[0], n[1], n[2], n[3]||0, n[4]||0, n[5]||0);
                    } else {
                        // Mes texto (1-12), ajustamos a 0-11
                        startPoint = new Date(n[0], n[1]-1, n[2], n[3]||0, n[4]||0, n[5]||0);
                    }
                    setInterval(updateClock, 1000);
                    updateClock();
                }
            } catch (e) { console.error("Sync Error"); }
        }

        function updateClock() {
            if (!startPoint) return;
            const diff = new Date() - startPoint;
            const safeDiff = diff < 0 ? 0 : diff;
            document.getElementById('days').innerText = Math.floor(safeDiff / 86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((safeDiff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((safeDiff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((safeDiff % 60000) / 1000).toString().padStart(2, '0');
        }

        async function reportarPresencia() {
            const btn = document.getElementById('btn-presence');
            const frame = document.getElementById('main-frame');
            
            btn.disabled = true;
            btn.innerText = "Enviando...";
            frame.classList.add('pulse-active');

            // --- EFECTO MÁGICO: Crear Luciérnagas ---
            crearParticulasLuciérnaga(8);

            try {
                // Notificación silenciosa
                await fetch(`${WEB_APP_URL}?quien=Victoria&tipo=Pulso&t=${new Date().getTime()}`, { mode: 'no-cors' });
                
                // Aumentar contador y guardar
                count++;
                localStorage.setItem('v_presences', count);
                actualizarHito(count);

                // Feedback visual exitoso
                btn.innerText = "Registrada";
                btn.classList.add('sent');
                
                setTimeout(() => {
                    frame.classList.remove('pulse-active');
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = "Hacerte presente";
                        btn.classList.remove('sent');
                    }, 3000);
                }, 2000);

            } catch (e) {
                btn.innerText = "Error de señal";
                btn.disabled = false;
                frame.classList.remove('pulse-active');
            }
        }

        function actualizarHito(n) {
            const display = document.getElementById('milestone-display');
            let hitoActual = null;
            Object.keys(hitos).forEach(k => { if(n >= k) hitoActual = hitos[k]; });

            if(hitoActual) {
                document.getElementById('ms-icon').innerText = hitoActual.icon;
                document.getElementById('ms-text').innerText = hitoActual.text;
                display.classList.add('show');
            }
        }

        // --- FUNCION VISUAL: Crear y Animar Luciérnagas ---
        function crearParticulasLuciérnaga(cantidad) {
            const container = document.body;
            const frame = document.getElementById('main-frame');
            const rect = frame.getBoundingClientRect();

            for (let i = 0; i < cantidad; i++) {
                const firefly = document.createElement('div');
                firefly.classList.add('firefly');
                
                // Tamaño aleatorio sutil
                const size = Math.random() * 4 + 2;
                firefly.style.width = `${size}px`;
                firefly.style.height = `${size}px`;

                // Posición inicial (centro del contador)
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                firefly.style.left = `${startX}px`;
                firefly.style.top = `${startY}px`;

                container.appendChild(firefly);

                // Animación hacia afuera y arriba (como si salieran volando del cristal)
                const destinationX = startX + (Math.random() - 0.5) * 400; // Dispersión horizontal
                const destinationY = startY - Math.random() * 300 - 150;    // Subida vertical
                const duration = Math.random() * 2000 + 2000;              // Duración lenta

                firefly.animate([
                    { opacity: 0, transform: 'translate(0, 0) scale(1)' },
                    { opacity: 1, transform: `translate(${(destinationX - startX) * 0.1}px, ${(destinationY - startY) * 0.1}px) scale(1.2)`, offset: 0.1 },
                    { opacity: 0.8, transform: `translate(${(destinationX - startX) * 0.8}px, ${(destinationY - startY) * 0.8}px) scale(1)`, offset: 0.8 },
                    { opacity: 0, transform: `translate(${destinationX - startX}px, ${destinationY - startY}px) scale(0.5)` }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.165, 0.84, 0.44, 1)', // Suave
                    fill: 'forwards'
                });

                // Limpiar elemento
                setTimeout(() => firefly.remove(), duration);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
