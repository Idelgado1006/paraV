<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Tiempo | Conexión Activa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #0a0f16;
            --accent: #fa165a;
            --accent-muted: rgba(250, 22, 90, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(250, 22, 90, 0.4);
            --spring-eas: cubic-bezier(0.34, 1.56, 0.64, 1);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --accent-rgb: 250, 22, 90;
        }

        /* TEMAS NAVBAR */
        body.theme-midnight {
            --bg-dark: #000000;
            --accent: #fde047;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border-glass: rgba(253, 224, 71, 0.3);
            --accent-rgb: 253, 224, 71;
            --btn-bg: rgba(253, 224, 71, 0.1);
            --glow: 0 0 20px rgba(253, 224, 71, 0.4);
        }

        body.theme-light {
            --bg-dark: #fcfaf7;
            --accent: #f59e0b;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border-glass: rgba(245, 158, 11, 0.3);
            --accent-rgb: 245, 158, 11;
            --btn-bg: rgba(245, 158, 11, 0.1);
            --glow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(rgba(var(--accent-rgb), 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
            transition: background-color 0.6s ease;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 15px; width: calc(100% - 30px); max-width: 500px; height: 65px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass); border-radius: 22px; z-index: 10000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideDown 0.8s var(--spring-eas);
        }

        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-home, .nav-extra-btn, .nav-music-btn, .theme-btn, .nav-heart-btn {
            text-decoration: none; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: var(--btn-bg); border: 1px solid var(--border-glass);
            transition: all 0.2s var(--spring-eas); cursor: pointer; color: var(--text-main); font-size: 1.1rem;
        }

        .system-status { display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .status-dot-wrapper { display: flex; align-items: center; gap: 6px; font-family: monospace; font-size: 0.55rem; font-weight: 700; color: var(--text-main); }
        .dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .nav-divider { width: 1px; height: 24px; background: var(--border-glass); margin: 0 2px; }

        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- CONTENEDOR CONTADOR --- */
        .counter-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 50px 25px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
            position: relative;
            z-index: 10;
            margin-top: 60px; /* Espacio para la navbar */
        }

        .counter-container.pulse-active {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.2);
        }

        .counter-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        .timer-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .time-unit span {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-main);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            transition: all 0.3s ease;
        }

        .pulse-active .time-unit span {
            color: var(--accent);
            text-shadow: var(--glow);
        }

        .time-separator {
            font-size: 2rem;
            color: var(--accent);
            opacity: 0.4;
            margin-top: -25px;
        }

        .time-unit small {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 12px;
            letter-spacing: 1.5px;
            display: block;
        }

        .presence-btn {
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-dim);
            padding: 15px 30px;
            border-radius: 100px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .presence-btn:hover {
            color: var(--text-main);
            border-color: var(--accent);
            background: var(--accent-muted);
        }

        .presence-btn.sent {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.05);
            animation: success-bounce 0.4s ease;
        }

        @keyframes success-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .milestone-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            opacity: 0;
            transition: opacity 1s ease;
        }

        .milestone-box.show { opacity: 1; }

        #ms-icon { font-size: 1.5rem; display: block; margin-bottom: 10px; }
        #ms-text { font-size: 0.8rem; color: var(--text-dim); font-style: italic; line-height: 1.5; }

        .footer-tag {
            display: block;
            margin-top: 30px;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--accent);
            opacity: 0.6;
        }

        .firefly {
            position: absolute;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px rgba(var(--accent-rgb), 0.5);
            opacity: 0;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .time-unit span { font-size: 2.2rem; }
            .time-separator { font-size: 1.5rem; margin-top: -18px; }
            .counter-container { padding: 40px 15px; width: 95%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-home">🏠</a>
            <div class="system-status">
                <div class="status-dot-wrapper">
                    <span class="dot"></span> TIME_LOG
                </div>
                <div style="font-size: 0.5rem; color: var(--text-dim); font-family: monospace; margin-left: 13px;">SYNC_V2 / ACTIVE</div>
            </div>
        </div>

        <div class="nav-right">
            <a href="seccion4.html" class="nav-music-btn" title="Música">🎵</a>
            <a href="https://idelgado1006.github.io/CALKI/" class="nav-extra-btn" title="CALKI" target="_blank">🔗</a>
            <a href="seccion5.html" class="nav-heart-btn" title="Refugio">❤️</a>
            <div class="nav-divider"></div>
            <button class="theme-btn" onclick="cycleTheme()" id="themeBtn">💖</button>
        </div>
    </nav>

    <div class="counter-container" id="main-frame">
        <p class="counter-label">BURN THE SHIPS</p>
        
        <div class="timer-grid">
            <div class="time-unit"><span id="days">00</span><small>días</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="hours">00</span><small>hrs</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="minutes">00</span><small>min</small></div>
            <div class="time-separator">:</div>
            <div class="time-unit"><span id="seconds">00</span><small>seg</small></div>
        </div>

        <button class="presence-btn" id="btn-presence" onclick="reportarPresencia()">
            PULSAR
        </button>

        <div id="milestone-display" class="milestone-box">
            <span id="ms-icon"></span>
            <p id="ms-text"></p>
        </div>

        <span class="footer-tag">LOG_STATUS: DISTANCIA // 31-MAR-10:21</span>
    </div>

    <script>
        // CONFIGURACIÓN DE TEMAS
        let currentTheme = 0; 
        const themes = ['theme-dark', 'theme-midnight', 'theme-light'];
        const icons = ['💖', '🌙', '☀️'];

        function cycleTheme() {
            document.body.classList.remove(themes[currentTheme]);
            currentTheme = (currentTheme + 1) % themes.length;
            document.body.classList.add(themes[currentTheme]);
            document.getElementById('themeBtn').innerText = icons[currentTheme];
            if(navigator.vibrate) navigator.vibrate(10);
        }

        // CONFIGURACIÓN CONTADOR
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbylhcRb3qWKynJyU-ggE4asJ2_6bRSUEBxO2eo6yHlQbz2sJ4P8sePOrYEPrb9Zzsv_/exec'; 
        const SHEET_ID = '1OkOYolMxeWx5AmxA9RydHrRjesdK5qnUPsQtS003k_w';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja%201`;
        
        let startPoint = null;
        let count = parseInt(localStorage.getItem('v_presences')) || 0;

        const hitos = {
            1: { icon: '✨', text: "en realidad no encontre la forma de hacer util ese botón, pero si lo quito rompo todo el sistema, asi que solo existe" },
        };

        async function init() {
            actualizarHito(count);
            try {
                const response = await fetch(DATA_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const val = json.table.rows[0].c[11] ? json.table.rows[0].c[11].v : null;

                if (val) {
                    const n = val.toString().match(/\d+/g).map(Number);
                    if (val.toString().includes('Date')) {
                        startPoint = new Date(n[0], n[1], n[2], n[3]||0, n[4]||0, n[5]||0);
                    } else {
                        startPoint = new Date(n[0], n[1]-1, n[2], n[3]||0, n[4]||0, n[5]||0);
                    }
                    setInterval(updateClock, 1000);
                    updateClock();
                }
            } catch (e) { console.error("Sync Error"); }
        }

        function updateClock() {
            if (!startPoint) return;
            const diff = new Date() - startPoint;
            const safeDiff = diff < 0 ? 0 : diff;
            document.getElementById('days').innerText = Math.floor(safeDiff / 86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((safeDiff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((safeDiff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((safeDiff % 60000) / 1000).toString().padStart(2, '0');
        }

        async function reportarPresencia() {
            const btn = document.getElementById('btn-presence');
            const frame = document.getElementById('main-frame');
            
            btn.disabled = true;
            btn.innerText = "Enviando...";
            frame.classList.add('pulse-active');
            crearParticulasLuciérnaga(8);

            try {
                await fetch(`${WEB_APP_URL}?quien=Victoria&tipo=Pulso&t=${new Date().getTime()}`, { mode: 'no-cors' });
                
                count++;
                localStorage.setItem('v_presences', count);
                actualizarHito(count);

                btn.innerText = "Registrada";
                btn.classList.add('sent');
                if(navigator.vibrate) navigator.vibrate(30);
                
                setTimeout(() => {
                    frame.classList.remove('pulse-active');
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = "PULSAR";
                        btn.classList.remove('sent');
                    }, 3000);
                }, 2000);

            } catch (e) {
                btn.innerText = "Error de señal";
                btn.disabled = false;
                frame.classList.remove('pulse-active');
            }
        }

        function actualizarHito(n) {
            const display = document.getElementById('milestone-display');
            let hitoActual = null;
            Object.keys(hitos).forEach(k => { if(n >= k) hitoActual = hitos[k]; });

            if(hitoActual) {
                document.getElementById('ms-icon').innerText = hitoActual.icon;
                document.getElementById('ms-text').innerText = hitoActual.text;
                display.classList.add('show');
            }
        }

        function crearParticulasLuciérnaga(cantidad) {
            const container = document.body;
            const frame = document.getElementById('main-frame');
            const rect = frame.getBoundingClientRect();

            for (let i = 0; i < cantidad; i++) {
                const firefly = document.createElement('div');
                firefly.classList.add('firefly');
                const size = Math.random() * 4 + 2;
                firefly.style.width = `${size}px`;
                firefly.style.height = `${size}px`;
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                firefly.style.left = `${startX}px`;
                firefly.style.top = `${startY}px`;
                container.appendChild(firefly);

                const destinationX = startX + (Math.random() - 0.5) * 400;
                const destinationY = startY - Math.random() * 300 - 150;
                const duration = Math.random() * 2000 + 2000;

                firefly.animate([
                    { opacity: 0, transform: 'translate(0, 0) scale(1)' },
                    { opacity: 1, transform: `translate(${(destinationX - startX) * 0.1}px, ${(destinationY - startY) * 0.1}px) scale(1.2)`, offset: 0.1 },
                    { opacity: 0, transform: `translate(${destinationX - startX}px, ${destinationY - startY}px) scale(0.5)` }
                ], { duration: duration, easing: 'ease-out', fill: 'forwards' });

                setTimeout(() => firefly.remove(), duration);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
